<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Thêm xe - DriverGuard AI</title>

    <link rel="stylesheet" href="./static/css/global.css">
    <link rel="stylesheet" href="./static/css/layout.css">
    <link rel="stylesheet" href="./static/css/dashboard.css">
    <link rel="stylesheet" href="./static/css/vehicles.css">
</head>
<body>

<div class="app">

    <aside class="sidebar">
        <div class="logo">
            <div class="logo-icon">🛡</div>
            <div>
                <h2>DriverGuard</h2>
                <span>AI SAFETY</span>
            </div>
        </div>

        <nav class="menu">
            <a href="./dashboard.html">📊 Dashboard</a>
            <a href="./drivers.html">👥 Tài xế</a>
            <a href="{{ url_for('vehicles') }}" class="active">🚘 Quản lý xe</a>
            <a href="./shifts.html">⏱ Ca làm việc</a>
            <a href="./camera.html">📷 Camera AI</a>
            <a href="./alerts.html">⚠️ Lịch sử cảnh báo</a>
            <a href="./stats.html">📈 Thống kê</a>
            <a href="./settings.html">⚙️ Cài đặt</a>
            <a href="{{ url_for('logout') }}">🚪 Đăng xuất</a>
        </nav>
    </aside>

    <main class="main">

        <header class="header">
            <div>
                <h1>Thêm xe</h1>
                <p>Nhập thông tin phương tiện để gán tài xế và ca làm việc</p>
            </div>

            <div class="header-right">
                <div class="user-box">
                    <div class="avatar">A</div>
                    <div>
                        <strong>Admin System</strong>
                        <p>Quản trị viên</p>
                    </div>
                </div>
            </div>
        </header>

        <section class="content">
            <form class="card vehicle-table-card" method="POST" action="{{ url_for('add_vehicle') }}" style="padding:24px;">
                <div class="vehicle-summary" style="grid-template-columns:repeat(2,1fr);">
                    <div>
                        <label>Biển số xe</label>
                        <input
                            type="text"
                            name="plate_number"
                            value="{{ form_data.plate_number if form_data else '' }}"
                            placeholder="51A-12345"
                            required
                        >
                    </div>

                    <div>
                        <label>Loại xe</label>
                        <select name="vehicle_type">
                            <option value="Xe tải">Xe tải</option>
                            <option value="Xe khách">Xe khách</option>
                            <option value="Xe container">Xe container</option>
                            <option value="Xe dịch vụ">Xe dịch vụ</option>
                        </select>
                    </div>

                    <div>
                        <label>Hãng xe</label>
                        <input
                            type="text"
                            name="brand"
                            value="{{ form_data.brand if form_data else '' }}"
                            placeholder="Hyundai"
                        >
                    </div>

                    <div>
                        <label>Trạng thái</label>
                        <select name="status">
                            <option value="active">Đang hoạt động</option>
                            <option value="maintenance">Bảo trì</option>
                            <option value="inactive">Ngưng sử dụng</option>
                        </select>
                    </div>
                </div>

                <div class="vehicle-actions" style="margin-bottom:0;">
                    <a href="{{ url_for('vehicles') }}" class="btn-outline" style="text-decoration:none;">Hủy</a>
                    <button type="submit" class="btn-outline">Lưu xe</button>
                </div>
            </form>
        </section>

    </main>

</div>

</body>
</html>
