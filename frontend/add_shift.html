<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Tạo ca làm việc - DriverGuard AI</title>

    <link rel="stylesheet" href="./static/css/global.css">
    <link rel="stylesheet" href="./static/css/layout.css">
    <link rel="stylesheet" href="./static/css/dashboard.css">
    <link rel="stylesheet" href="./static/css/shifts.css">
</head>
<body>

<div class="app">

    <aside class="sidebar">
        <div class="logo">
            <div class="logo-icon">🛡</div>
            <div>
                <h2>DriverGuard</h2>
                <span>AI SAFETY</span>
            </div>
        </div>

        <nav class="menu">
            <a href="./dashboard.html">📊 Dashboard</a>
            <a href="./drivers.html">👥 Tài xế</a>
            <a href="./vehicles.html">🚘 Quản lý xe</a>
            <a href="./shifts.html" class="active">⏱ Ca làm việc</a>
            <a href="./camera.html">📷 Camera AI</a>
            <a href="./alerts.html">⚠️ Lịch sử cảnh báo</a>
            <a href="./stats.html">📈 Thống kê</a>
            <a href="./settings.html">⚙️ Cài đặt</a>
            <a href="./login.html">🚪 Đăng xuất</a>
        </nav>
    </aside>

    <main class="main">

        <header class="header">
            <div>
                <h1>Tạo ca làm việc</h1>
                <p>Gán tài xế với xe theo ngày và khung giờ vận hành</p>
            </div>

            <div class="header-right">
                <input class="search-box" placeholder="Tìm kiếm...">
                <div class="user-box">
                    <div class="avatar">A</div>
                    <div>
                        <strong>Admin System</strong>
                        <p>Quản trị viên</p>
                    </div>
                </div>
            </div>
        </header>

        <section class="content">
            <form class="card shift-table-card" style="padding:24px;">
                <div class="shift-summary" style="grid-template-columns:repeat(2,1fr);">
                    <div>
                        <label>Tên ca</label>
                        <input
                            type="text"
                            name="shift_name"
                            value=""
                            placeholder="Ca sáng"
                        >
                    </div>

                    <div>
                        <label>Ngày làm việc</label>
                        <input
                            type="date"
                            name="work_date"
                            required
                        >
                    </div>

                    <div>
                        <label>Tài xế</label>
                        <select name="driver_id" required>
                            <option value="">Chọn tài xế</option>
                            <option value="1">Nguyễn Văn A - TX001</option>
                            <option value="2">Trần Văn B - TX002</option>
                            <option value="3">Lê Văn C - TX003</option>
                        </select>
                    </div>

                    <div>
                        <label>Xe phụ trách</label>
                        <select name="vehicle_id" required>
                            <option value="">Chọn xe</option>
                            <option value="1">47A-12345 - Xe tải</option>
                            <option value="2">47B-67890 - Xe khách</option>
                            <option value="3">47C-24680 - Container</option>
                        </select>
                    </div>

                    <div>
                        <label>Giờ bắt đầu</label>
                        <input
                            type="time"
                            name="start_time"
                        >
                    </div>

                    <div>
                        <label>Giờ kết thúc</label>
                        <input
                            type="time"
                            name="end_time"
                        >
                    </div>

                    <div>
                        <label>Trạng thái</label>
                        <select name="status">
                            <option value="scheduled">Sắp bắt đầu</option>
                            <option value="active">Đang hoạt động</option>
                            <option value="completed">Đã kết thúc</option>
                            <option value="cancelled">Đã hủy</option>
                        </select>
                    </div>
                </div>

                <div class="shift-actions" style="margin-bottom:0;">
                    <a href="./shifts.html" class="btn-outline" style="text-decoration:none;">Hủy</a>
                    <button type="button" class="btn-outline">Lưu ca</button>
                </div>
            </form>
        </section>

    </main>

</div>

</body>
</html>
