<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Tạo ca làm việc - DriverGuard AI</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/global.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/layout.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/dashboard.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/shifts.css') }}">
</head>
<body>

<div class="app">

    <aside class="sidebar">
        <div class="logo">
            <div class="logo-icon">🛡</div>
            <div>
                <h2>DriverGuard</h2>
                <span>AI SAFETY</span>
            </div>
        </div>

        <nav class="menu">
            <a href="/dashboard">📊 Dashboard</a>
            <a href="/drivers">👥 Tài xế</a>
            <a href="/vehicles">🚘 Quản lý xe</a>
            <a href="/shifts" class="active">⏱ Ca làm việc</a>
            <a href="/camera">📷 Camera AI</a>
            <a href="/alerts">⚠️ Lịch sử cảnh báo</a>
            <a href="/stats">📈 Thống kê</a>
            <a href="/settings">⚙️ Cài đặt</a>
            <a href="/login">🚪 Đăng xuất</a>
        </nav>
    </aside>

    <main class="main">

        <header class="header">
            <div>
                <h1>Tạo ca làm việc</h1>
                <p>Gán tài xế với xe theo ngày và khung giờ vận hành</p>
            </div>

            <div class="header-right">
                <input class="search-box" placeholder="Tìm kiếm...">
                <div class="user-box">
                    <div class="avatar">A</div>
                    <div>
                        <strong>Admin System</strong>
                        <p>Quản trị viên</p>
                    </div>
                </div>
            </div>
        </header>

        <section class="content">
            <form class="card shift-table-card" method="POST" action="{{ url_for('add_shift') }}" style="padding:24px;">
                <div class="shift-summary" style="grid-template-columns:repeat(2,1fr);">
                    <div>
                        <label>Tên ca</label>
                        <input
                            type="text"
                            name="shift_name"
                            value="{{ form_data.shift_name if form_data else '' }}"
                            placeholder="Ca sáng"
                        >
                    </div>

                    <div>
                        <label>Ngày làm việc</label>
                        <input
                            type="date"
                            name="work_date"
                            value="{{ form_data.work_date if form_data else '' }}"
                            required
                        >
                    </div>

                    <div>
                        <label>Tài xế</label>
                        <select name="driver_id" required>
                            <option value="">Chọn tài xế</option>
                            {% for driver in drivers %}
                            <option value="{{ driver.id }}" {% if form_data and form_data.driver_id == driver.id %}selected{% endif %}>
                                {{ driver.full_name }}{% if driver.driver_code %} - {{ driver.driver_code }}{% endif %}
                            </option>
                            {% endfor %}
                        </select>
                    </div>

                    <div>
                        <label>Xe phụ trách</label>
                        <select name="vehicle_id" required>
                            <option value="">Chọn xe</option>
                            {% for vehicle in vehicles %}
                            <option value="{{ vehicle.id }}" {% if form_data and form_data.vehicle_id == vehicle.id %}selected{% endif %}>
                                {{ vehicle.plate_number }}{% if vehicle.vehicle_type %} - {{ vehicle.vehicle_type }}{% endif %}
                            </option>
                            {% endfor %}
                        </select>
                    </div>

                    <div>
                        <label>Giờ bắt đầu</label>
                        <input
                            type="time"
                            name="start_time"
                            value="{{ form_data.start_time if form_data else '' }}"
                        >
                    </div>

                    <div>
                        <label>Giờ kết thúc</label>
                        <input
                            type="time"
                            name="end_time"
                            value="{{ form_data.end_time if form_data else '' }}"
                        >
                    </div>

                    <div>
                        <label>Trạng thái</label>
                        <select name="status">
                            <option value="scheduled" {% if form_data and form_data.status == 'scheduled' %}selected{% endif %}>Sắp bắt đầu</option>
                            <option value="active" {% if form_data and form_data.status == 'active' %}selected{% endif %}>Đang hoạt động</option>
                            <option value="completed" {% if form_data and form_data.status == 'completed' %}selected{% endif %}>Đã kết thúc</option>
                            <option value="cancelled" {% if form_data and form_data.status == 'cancelled' %}selected{% endif %}>Đã hủy</option>
                        </select>
                    </div>
                </div>

                <div class="shift-actions" style="margin-bottom:0;">
                    <a href="/shifts" class="btn-outline" style="text-decoration:none;">Hủy</a>
                    <button type="submit" class="btn-outline">Lưu ca</button>
                </div>
            </form>
        </section>

    </main>

</div>
</body>
</html>
